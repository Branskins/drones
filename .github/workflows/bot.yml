name: trading-bot

on:
  schedule:
    - cron: "*/15 * * * *" # best-effort; the bot tolerates skipped/late runs
  workflow_dispatch: {}

concurrency:
  group: trading-bot # never two cycles at once (protects nonces + order state)
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-bot.txt
      - run: python -m bot.run
        env:
          # Bot-dedicated Kraken key: query/create/cancel orders ONLY, no
          # withdrawal rights. Unused in paper mode but required for live.
          PUBLIC_KEY: ${{ secrets.KRAKEN_BOT_PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.KRAKEN_BOT_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          # ALLOW_LIVE is deliberately NOT set here. Live trading requires a
          # human to add it (Phase 5) — see docs/human-actions.md.
